<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>云e宝 · 工具箱</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

  :root {
    --bg: #0a0c12;
    --bg2: #12151f;
    --bg3: #181c2a;
    --border: #232840;
    --accent: #4f8dff;
    --accent2: #7c5cfc;
    --green: #2ecc8a;
    --amber: #f5a623;
    --text: #e8eaf0;
    --text2: #8b91a8;
    --text3: #454d66;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* 背景网格 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(79,141,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,141,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 60px 24px 80px;
  }

  /* 头部 */
  .header {
    text-align: center;
    margin-bottom: 64px;
  }

  .logo-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 16px;
    border-radius: 20px;
    border: 1px solid rgba(79,141,255,0.3);
    background: rgba(79,141,255,0.08);
    font-size: 12px;
    color: var(--accent);
    margin-bottom: 24px;
    letter-spacing: 1px;
  }

  .logo-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .header h1 {
    font-size: 42px;
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 16px;
    background: linear-gradient(135deg, #e8eaf0 0%, #4f8dff 50%, #7c5cfc 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header p {
    font-size: 15px;
    color: var(--text2);
    line-height: 1.7;
    max-width: 480px;
    margin: 0 auto;
  }

  /* 工具卡片区 */
  .section-label {
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .tools-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
    margin-bottom: 48px;
  }

  .tool-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    cursor: pointer;
    text-decoration: none;
    display: block;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
  }

  .tool-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(79,141,255,0.04), transparent);
    opacity: 0;
    transition: opacity 0.25s;
  }

  .tool-card:hover {
    border-color: rgba(79,141,255,0.4);
    transform: translateY(-3px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(79,141,255,0.1);
  }

  .tool-card:hover::before { opacity: 1; }

  .tool-icon {
    width: 44px; height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    margin-bottom: 16px;
  }

  .icon-blue { background: rgba(79,141,255,0.15); }
  .icon-purple { background: rgba(124,92,252,0.15); }
  .icon-green { background: rgba(46,204,138,0.15); }
  .icon-amber { background: rgba(245,166,35,0.15); }

  .tool-name {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 6px;
  }

  .tool-desc {
    font-size: 12px;
    color: var(--text2);
    line-height: 1.6;
    margin-bottom: 16px;
  }

  .tool-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }

  .tool-tag {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--bg3);
    color: var(--text3);
    border: 1px solid var(--border);
  }

  .tool-arrow {
    position: absolute;
    top: 24px;
    right: 24px;
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--bg3);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    color: var(--text3);
    transition: all 0.2s;
  }

  .tool-card:hover .tool-arrow {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* 即将推出卡片 */
  .tool-card.coming {
    opacity: 0.5;
    cursor: default;
    pointer-events: none;
  }

  .coming-badge {
    position: absolute;
    top: 16px;
    right: 16px;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    background: rgba(245,166,35,0.15);
    color: var(--amber);
    border: 1px solid rgba(245,166,35,0.3);
  }

  /* 底部 */
  .footer {
    text-align: center;
    padding-top: 32px;
    border-top: 1px solid var(--border);
  }

  .footer p {
    font-size: 12px;
    color: var(--text3);
    line-height: 1.8;
  }

  /* 更新日志小标签 */
  .update-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    margin-right: 4px;
    vertical-align: middle;
  }
</style>
</head>
<body>
<div class="container">

  <!-- 头部 -->
  <div class="header">
    <div class="logo-badge">
      <div class="logo-dot"></div>
      云e宝 · 内部工具箱
    </div>
    <h1>销售效率工具</h1>
    <p>专为云e宝销售团队打造的 AI 辅助工具集，帮你更快成交、更好跟进客户</p>
  </div>

  <!-- 已上线工具 -->
  <div class="section-label">已上线</div>
  <div class="tools-grid">

    <a href="./销售助手.html" class="tool-card">
      <div class="tool-arrow">→</div>
      <div class="tool-icon icon-blue">💬</div>
      <div class="tool-name">AI 销售助手</div>
      <div class="tool-desc">粘贴客户消息，秒出话术建议。自动打标签、跟进提醒、风格学习，越用越懂你。</div>
      <div class="tool-tags">
        <span class="tool-tag">话术生成</span>
        <span class="tool-tag">客户标签</span>
        <span class="tool-tag">上下文记忆</span>
        <span class="tool-tag">风格学习</span>
        <span class="tool-tag">每日跟进</span>
      </div>
    </a>

    <!-- 占位：即将上线 -->
    <div class="tool-card coming">
      <div class="coming-badge">即将上线</div>
      <div class="tool-icon icon-purple">📊</div>
      <div class="tool-name">客户数据分析</div>
      <div class="tool-desc">可视化跟进漏斗、成交率分析、最佳联系时段统计。</div>
      <div class="tool-tags">
        <span class="tool-tag">数据分析</span>
        <span class="tool-tag">漏斗图</span>
      </div>
    </div>

    <div class="tool-card coming">
      <div class="coming-badge">即将上线</div>
      <div class="tool-icon icon-green">✍️</div>
      <div class="tool-name">朋友圈文案生成</div>
      <div class="tool-desc">一键生成服装店场景的朋友圈推广文案，支持多种风格。</div>
      <div class="tool-tags">
        <span class="tool-tag">文案创作</span>
        <span class="tool-tag">朋友圈</span>
      </div>
    </div>

  </div>

  <!-- 底部 -->
  <div class="footer">
    <p>
      <span class="update-dot"></span>
      云e宝服装管理系统 · 内部工具 · 仅供团队使用
    </p>
    <p style="margin-top:6px">由 AI 驱动 · 持续迭代中</p>
  </div>

</div>
</body>
</html>
